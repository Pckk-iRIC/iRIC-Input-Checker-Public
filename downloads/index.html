<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>iRIC Input Checker ダウンロード</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fa;
      --panel: #ffffff;
      --text: #1f2328;
      --muted: #59636e;
      --border: #d0d7de;
      --accent: #0969da;
      --accent-hover: #0757b8;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Yu Gothic UI", "Meiryo", sans-serif;
      line-height: 1.65;
    }
    main {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 64px;
    }
    header {
      margin-bottom: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }
    h2 {
      margin: 0;
      font-size: 1.2rem;
    }
    p {
      margin: 8px 0;
    }
    .muted {
      color: var(--muted);
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 1px 2px rgba(31, 35, 40, 0.04);
    }
    .release {
      display: grid;
      gap: 12px;
      padding: 18px 0;
      border-top: 1px solid var(--border);
    }
    .release:first-child {
      border-top: 0;
      padding-top: 0;
    }
    .release-head {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: baseline;
      justify-content: space-between;
    }
    .tag {
      font-weight: 700;
      font-size: 1.05rem;
    }
    .asset {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fbfcfe;
    }
    .button {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
    .button:hover {
      background: var(--accent-hover);
    }
    .links {
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>iRIC Input Checker ダウンロード</h1>
      <p class="muted">公開済みリリースから、実行ファイル一式の zip だけを表示します。</p>
    </header>

    <section class="panel" aria-live="polite">
      <div id="status" class="muted">リリース情報を取得しています...</div>
      <div id="releases"></div>
    </section>

    <p class="links">
      <a href="../">ドキュメントに戻る</a>
      /
      <a href="https://github.com/Pckk-iRIC/iRIC-Input-Checker/releases">GitHub Releases を開く</a>
    </p>
  </main>

  <script>
    const releasesEl = document.getElementById("releases");
    const statusEl = document.getElementById("status");
    const releasesUrl = "./releases.json";

    function formatBytes(size) {
      if (!Number.isFinite(size)) return "";
      const mib = size / (1024 * 1024);
      return `${mib.toFixed(1)} MB`;
    }

    function renderAsset(asset) {
      const row = document.createElement("div");
      row.className = "asset";

      const meta = document.createElement("div");
      meta.textContent = `${asset.name} (${formatBytes(asset.size)})`;

      const link = document.createElement("a");
      link.className = "button";
      link.href = asset.browser_download_url;
      link.textContent = "ダウンロード";
      link.rel = "noopener";

      row.append(meta, link);
      return row;
    }

    function renderRelease(release) {
      const assets = release.assets || [];
      if (assets.length === 0) return null;

      const section = document.createElement("section");
      section.className = "release";

      const head = document.createElement("div");
      head.className = "release-head";

      const tag = document.createElement("h2");
      tag.className = "tag";
      tag.textContent = release.name || release.tag_name;

      const date = document.createElement("span");
      date.className = "muted";
      date.textContent = release.published_at ? new Date(release.published_at).toLocaleDateString("ja-JP") : "";

      head.append(tag, date);
      section.append(head, ...assets.map(renderAsset));
      return section;
    }

    async function main() {
      try {
        const response = await fetch(releasesUrl, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Download metadata error: ${response.status}`);
        }
        const releases = await response.json();
        const sections = releases
          .map(renderRelease)
          .filter(Boolean);

        statusEl.textContent = sections.length === 0
          ? "ダウンロード可能な実行ファイル一式が見つかりませんでした。"
          : "";
        releasesEl.replaceChildren(...sections);
      } catch (error) {
        statusEl.textContent = "リリース情報を取得できませんでした。GitHub Releases から直接ダウンロードしてください。";
      }
    }

    main();
  </script>
</body>
</html>
